<svg width="1180" height="720" viewBox="0 0 1180 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Window Frame -->
  <rect width="1180" height="720" rx="20" fill="#F3F5F9"/>
  <rect x="1" y="1" width="1178" height="718" rx="19" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Browser Header Bar -->
  <rect x="2" y="2" width="1176" height="52" rx="18" fill="#FFFFFF"/>
  <rect x="2" y="53" width="1176" height="1" fill="#E2E8F0"/>
  
  <!-- Window Controls -->
  <circle cx="28" cy="26" r="6" fill="#EF4444"/>
  <circle cx="48" cy="26" r="6" fill="#F59E0B"/>
  <circle cx="68" cy="26" r="6" fill="#10B981"/>
  
  <!-- Address Bar -->
  <rect x="100" y="12" width="600" height="28" rx="14" fill="#F1F5F9"/>
  <text x="120" y="30" fill="#64748B" font-family="Inter, sans-serif" font-size="12" font-weight="500">app.itesic.cl/sistemas/bitácoras</text>
  
  <!-- User/Status -->
  <rect x="1010" y="12" width="140" height="28" rx="14" fill="#F1F5F9"/>
  <circle cx="1024" cy="26" r="7" fill="#64748B"/>
  <text x="1040" y="30" fill="#475569" font-family="Inter, sans-serif" font-size="11" font-weight="700">F. Rubilar</text>

  <!-- Sidebar Container -->
  <rect x="2" y="54" width="220" height="664" fill="#FFFFFF"/>
  <rect x="221" y="54" width="1" height="664" fill="#E2E8F0"/>

  <!-- Logo -->
  <rect x="24" y="80" width="36" height="36" rx="8" fill="#475569"/>
  <text x="32" y="104" fill="#FFFFFF" font-family="Sora, sans-serif" font-size="18" font-weight="900">Bi</text>
  <text x="72" y="96" fill="#0F172A" font-family="Sora, sans-serif" font-size="15" font-weight="800">Bitácoras</text>
  <text x="72" y="112" fill="#64748B" font-family="Inter, sans-serif" font-size="10" font-weight="600">Área de Trabajo</text>

  <!-- Sidebar Menu Items -->
  
    <rect x="12" y="146" width="196" height="34" rx="8" fill="#47556912"/>
    <circle cx="34" cy="160" r="4" fill="#475569"/>
    <text x="48" y="164" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="700">Registros</text>
    
    
    <circle cx="34" cy="202" r="4" fill="#94A3B8"/>
    <text x="48" y="206" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="600">Turnos</text>
    
    
    <circle cx="34" cy="244" r="4" fill="#94A3B8"/>
    <text x="48" y="248" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="600">Novedades</text>
    
    
    <circle cx="34" cy="286" r="4" fill="#94A3B8"/>
    <text x="48" y="290" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="600">Categorías</text>
    
    
    <circle cx="34" cy="328" r="4" fill="#94A3B8"/>
    <text x="48" y="332" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="600">Reportes</text>
    

  <!-- Main Content Area -->
  <g transform="translate(242, 74)">
    
  <!-- Top Title Bar -->
  <text x="20" y="40" fill="#0F172A" font-family="Sora, sans-serif" font-size="22" font-weight="800">Libro de Bitácoras Operacionales</text>
  <text x="20" y="60" fill="#64748B" font-family="Inter, sans-serif" font-size="13" font-weight="500">Historial de novedades, traspasos de turno e incidentes operativos</text>

  <!-- Bitacoras table/logs -->
  <g transform="translate(20, 90)">
    <rect x="0" y="0" width="860" height="500" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="24" y="36" fill="#0F172A" font-family="Sora, sans-serif" font-size="16" font-weight="800">Registros de Hoy (Turno Rotativo)</text>
    
    <!-- Timeline vertical bar -->
    <line x1="80" y1="80" x2="80" y2="440" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>

    <!-- Entry 1 -->
    <circle cx="80" cy="110" r="8" fill="#2F6BFF" stroke="#FFFFFF" stroke-width="2"/>
    <text x="110" y="104" fill="#64748B" font-family="Inter, sans-serif" font-size="12" font-weight="700">08:00 AM — Turno Mañana</text>
    <rect x="110" y="112" width="700" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="126" y="132" fill="#0F172A" font-family="Inter, sans-serif" font-size="12" font-weight="700">Inicio de Turno</text>
    <text x="126" y="152" fill="#475569" font-family="Inter, sans-serif" font-size="12" font-weight="500">Traspaso conforme de operador anterior. Planta operando a capacidad nominal de 450 Ton/h.</text>
    <text x="740" y="134" fill="#64748B" font-family="Inter, sans-serif" font-size="11" font-weight="700">H. Castro</text>

    <!-- Entry 2 -->
    <circle cx="80" cy="220" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2"/>
    <text x="110" y="214" fill="#EF4444" font-family="Inter, sans-serif" font-size="12" font-weight="700">10:30 AM — Incidente Mecánico</text>
    <rect x="110" y="222" width="700" height="74" rx="8" fill="#EF444406" stroke="#EF444422"/>
    <text x="126" y="242" fill="#0F172A" font-family="Inter, sans-serif" font-size="12" font-weight="700">Parada Preventiva Correa Despacho C3</text>
    <text x="126" y="262" fill="#475569" font-family="Inter, sans-serif" font-size="12" font-weight="500">Bloqueo de seguridad de correa por atasco de material. Se solicita equipo de mantención.</text>
    <text x="126" y="280" fill="#EF4444" font-family="Inter, sans-serif" font-size="11" font-weight="700">Duración estimada: 45 min</text>
    <text x="740" y="244" fill="#64748B" font-family="Inter, sans-serif" font-size="11" font-weight="700">H. Castro</text>

    <!-- Entry 3 -->
    <circle cx="80" cy="340" r="8" fill="#10B981" stroke="#FFFFFF" stroke-width="2"/>
    <text x="110" y="334" fill="#64748B" font-family="Inter, sans-serif" font-size="12" font-weight="700">11:15 AM — Solución y Reanudación</text>
    <rect x="110" y="342" width="700" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="126" y="362" fill="#0F172A" font-family="Inter, sans-serif" font-size="12" font-weight="700">Operación Normalizada</text>
    <text x="126" y="382" fill="#475569" font-family="Inter, sans-serif" font-size="12" font-weight="500">Mantención finaliza limpieza de polines. Correa C3 reanuda operación. Ritmo ajustado.</text>
    <text x="740" y="364" fill="#64748B" font-family="Inter, sans-serif" font-size="11" font-weight="700">M. Valenzuela</text>
  </g>

  </g>
</svg>