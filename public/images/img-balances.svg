  <!-- Main Content Area -->
  <g transform="translate(242, 74)">
    
  <!-- Top Title Bar -->
  <text x="20" y="40" fill="#0F172A" font-family="Sora, sans-serif" font-size="22" font-weight="800">Portal de Balances Operacionales</text>
  <text x="20" y="60" fill="#64748B" font-family="Inter, sans-serif" font-size="13" font-weight="500">Visualización de diagramas de balance metalúrgico e indicadores de continuidad</text>

  <!-- Flowchart nodes -->
  <g transform="translate(20, 90)">
    <rect x="0" y="0" width="860" height="500" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="24" y="36" fill="#0F172A" font-family="Sora, sans-serif" font-size="16" font-weight="800">Diagrama de Flujo y Nodos de Consistencia</text>

