    <text x="56" y="240" fill="#0F172A" font-family="Sora, sans-serif" font-size="16" font-weight="800">12,000 Ton</text>

    <!-- Connector lines -->
    <path d="M180 220 L300 220" stroke="#94A3B8" stroke-width="4" stroke-dasharray="8 4" fill="none"/>

