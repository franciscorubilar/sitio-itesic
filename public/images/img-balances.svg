  <circle cx="48" cy="26" r="6" fill="#F59E0B"/>
  <circle cx="68" cy="26" r="6" fill="#10B981"/>
  
  <!-- Address Bar -->
  <rect x="100" y="12" width="600" height="28" rx="14" fill="#F1F5F9"/>
