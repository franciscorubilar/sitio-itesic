    <rect x="300" y="140" width="220" height="160" rx="14" fill="#2F6BFF12" stroke="#2F6BFF" stroke-width="2"/>
    <text x="320" y="176" fill="#2F6BFF" font-family="Inter, sans-serif" font-size="12" font-weight="800">PROCESO CONCENTRADOR</text>
    <text x="320" y="216" fill="#0F172A" font-family="Sora, sans-serif" font-size="24" font-weight="800">Rec. 92.4%</text>
    <text x="320" y="246" fill="#475569" font-family="Inter, sans-serif" font-size="11" font-weight="600">Consistencia: OK (100%)</text>
    <rect x="320" y="260" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="320" y="260" width="166" height="8" rx="4" fill="#2F6BFF"/>

    <!-- Output lines -->
    <path d="M520 190 L680 140" stroke="#16B7A3" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M520 250 L680 300" stroke="#EF4444" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Node 3: Concentrado -->
    <rect x="680" y="100" width="140" height="80" rx="10" fill="#16B7A312" stroke="#16B7A3" stroke-width="1.5"/>
    <text x="696" y="130" fill="#16B7A3" font-family="Inter, sans-serif" font-size="11" font-weight="700">CONCENTRADO</text>
    <text x="696" y="160" fill="#0F172A" font-family="Sora, sans-serif" font-size="16" font-weight="800">1,108 Ton</text>

    <!-- Node 4: Relaves -->
    <rect x="680" y="260" width="140" height="80" rx="10" fill="#EF444412" stroke="#EF4444" stroke-width="1.5"/>
    <text x="696" y="290" fill="#EF4444" font-family="Inter, sans-serif" font-size="11" font-weight="700">RELAVES (WSTE)</text>
    <text x="696" y="320" fill="#0F172A" font-family="Sora, sans-serif" font-size="16" font-weight="800">10,892 Ton</text>

    <!-- Status footer in card -->
    <rect x="40" y="420" width="780" height="50" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="60" y="450" fill="#475569" font-family="Inter, sans-serif" font-size="12" font-weight="600">✓ Calidad de Información Base comprobada. Sin brechas de datos reportadas hoy.</text>
  </g>

  </g>
