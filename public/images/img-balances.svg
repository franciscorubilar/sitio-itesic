  <text x="72" y="112" fill="#64748B" font-family="Inter, sans-serif" font-size="10" font-weight="600">Área de Trabajo</text>

  <!-- Sidebar Menu Items -->
  
    <rect x="12" y="146" width="196" height="34" rx="8" fill="#2F6BFF12"/>
    <circle cx="34" cy="160" r="4" fill="#2F6BFF"/>
    <text x="48" y="164" fill="#2F6BFF" font-family="Inter, sans-serif" font-size="13" font-weight="700">Diagramas</text>
    
    
    <circle cx="34" cy="202" r="4" fill="#94A3B8"/>
    <text x="48" y="206" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="600">KPI Balances</text>
    
    
    <circle cx="34" cy="244" r="4" fill="#94A3B8"/>
    <text x="48" y="248" fill="#475569" font-family="Inter, sans-serif" font-size="13" font-weight="600">Calidad</text>
    
    
    <circle cx="34" cy="286" r="4" fill="#94A3B8"/>
